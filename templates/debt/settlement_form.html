{% extends 'base.html' %}
{% block content %}
<div class="card shadow-sm mx-auto" style="max-width: 600px;">
    <div class="card-header bg-white fw-bold">Ghi nhận Thanh toán / Thu nợ</div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="mb-3">
                <label class="form-label fw-bold">{{ field.label }}</label>
                {{ field }}
                {% if field.help_text %}<div class="form-text">{{ field.help_text }}</div>{% endif %}
            </div>
            {% endfor %}
            <button type="submit" class="btn btn-warning w-100">Xác nhận thanh toán</button>
        </form>
    </div>
</div>
{% endblock %}
