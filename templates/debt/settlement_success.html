{% extends 'base.html' %}
{% block content %}
<div class="container text-center py-5">
    <div class="card shadow-sm mx-auto" style="max-width: 500px;">
        <div class="card-body py-5">
            <i class="bi bi-check-circle-fill text-success" style="font-size: 4rem;"></i>
            <h3 class="mt-4">Giao dịch thành công!</h3>
            <p class="text-muted">Đang đóng tab và quay lại trang chi tiết...</p>
            <script>
                // Refresh parent if possible and close current tab
                if (window.opener) {
                    window.opener.location.reload();
                }
                setTimeout(function() {
                    window.close();
                }, 1000);
            </script>
            <button onclick="window.close()" class="btn btn-primary mt-3">Đóng ngay</button>
        </div>
    </div>
</div>
{% endblock %}
