{% extends 'base.html' %}
{% block content %}
<div class="card shadow-sm mx-auto mt-5" style="max-width: 500px;">
    <div class="card-body text-center p-5">
        <h4 class="text-danger mb-4">Xác nhận xóa tài khoản</h4>
        <p>Bạn có chắc chắn muốn xóa tài khoản <strong>{{ object.username }}</strong>?</p>
        <p class="text-muted small">Hành động này không thể hoàn tác.</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger px-4">Đồng ý xóa</button>
            <a href="{% url 'accounts:user-list' %}" class="btn btn-outline-secondary px-4">Hủy bỏ</a>
        </form>
    </div>
</div>
{% endblock %}
