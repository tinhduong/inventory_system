{% extends 'base.html' %}
{% block content %}
<div class="card shadow-sm mx-auto" style="max-width: 600px;">
    <div class="card-header bg-white fw-bold">Thông tin Khách hàng / Nhà cung cấp</div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="mb-3 {% if field.field.widget.input_type == 'checkbox' %}form-check{% endif %}">
                {% if field.field.widget.input_type == 'checkbox' %}
                    {{ field }}
                    <label class="form-check-label">{{ field.label }}</label>
                {% else %}
                    <label class="form-label fw-bold">{{ field.label }}</label>
                    {{ field }}
                {% endif %}
            </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary w-100">Lưu thông tin</button>
        </form>
    </div>
</div>
{% endblock %}
