{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h3>Danh sách sản phẩm</h3>
    <a href="{% url 'catalog:product-create' %}" class="btn btn-primary">Thêm sản phẩm</a>
</div>
<div class="card">
    <div class="card-body p-0">
        <table class="table table-hover mb-0">
            <thead>
                <tr>
                    <th>Mã</th>
                    <th>Tên</th>
                    <th>ĐVT</th>
                    <th>Thao tác</th>
                </tr>
            </thead>
            <tbody>
                {% for p in products %}
                <tr>
                    <td>{{ p.code }}</td>
                    <td>{{ p.name }}</td>
                    <td>{{ p.unit }}</td>
                    <td><a href="{% url 'catalog:product-update' p.pk %}" class="btn btn-sm btn-link">Sửa</a></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
