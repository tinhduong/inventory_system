{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0 fw-bold">Danh mục sản phẩm</h4>
    <div class="d-flex gap-2">
        <a href="{% url 'catalog:product-export' %}" class="btn btn-outline-success">
            <i class="bi bi-download"></i> Xuất Excel
        </a>
        <a href="{% url 'catalog:product-import' %}" class="btn btn-outline-primary">
            <i class="bi bi-upload"></i> Import Excel
        </a>
        <a href="{% url 'catalog:product-create' %}" class="btn btn-primary">
            <i class="bi bi-plus-circle"></i> Thêm sản phẩm mới
        </a>
    </div>
</div>
<div class="card">
    <div class="card-body p-0">
        <table class="table table-hover mb-0">
            <thead>
                <tr>
                    <th>Mã</th>
                    <th>Tên</th>
                    <th>ĐVT</th>
                    <th>Ngưỡng</th>
                    <th>Thao tác</th>
                </tr>
            </thead>
            <tbody>
                {% for p in products %}
                <tr>
                    <td>{{ p.code }}</td>
                    <td>{{ p.name }}</td>
                    <td>{{ p.unit }}</td>
                    <td><span class="badge bg-secondary opacity-75">{{ p.min_stock }}</span></td>
                    <td><a href="{% url 'catalog:product-update' p.pk %}" class="btn btn-sm btn-link">Sửa</a></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
